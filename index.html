<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異世界RPG時計</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#d9b65c;
    --gold-bright:#f5e2a3;
    --gold-deep:#8a6d2f;
    --ink:#e9e2cf;
    --ink-dim:#a99f86;
    --panel-1:#1a1530;
    --panel-2:#0e0b1c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    display:flex;align-items:center;justify-content:center;
    height:100vh;
    background:transparent;
    font-family:'Cinzel','Shippori Mincho',serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* 枠のサイズに合わせて vmin で全体がスケールする */
  .window{
    position:relative;
    padding:4.5vmin 6vmin;
    color:var(--ink);
    background:
      radial-gradient(120% 160% at 50% 0%, rgba(80,60,140,.35), transparent 60%),
      linear-gradient(160deg, var(--panel-1), var(--panel-2));
    border:0.6vmin solid var(--gold-deep);
    border-radius:3vmin;
    box-shadow:
      0 0 0 0.2vmin rgba(0,0,0,.6),
      0 0 5vmin rgba(120,90,200,.25),
      inset 0 0 5vmin rgba(0,0,0,.55);
  }
  .window::before{
    content:"";position:absolute;inset:1.4vmin;border-radius:2vmin;
    border:0.25vmin solid rgba(217,182,92,.45);
    pointer-events:none;
  }
  .corner{
    position:absolute;width:2vmin;height:2vmin;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 45%, var(--gold-deep) 100%);
    box-shadow:0 0 1.5vmin rgba(245,226,163,.7);
  }
  .corner.tl{top:2vmin;left:2vmin}.corner.tr{top:2vmin;right:2vmin}
  .corner.bl{bottom:2vmin;left:2vmin}.corner.br{bottom:2vmin;right:2vmin}

  .time{
    text-align:center;
    font-weight:700;
    font-size:18vmin;
    line-height:1;
    letter-spacing:0.5vmin;
    color:var(--gold-bright);
    text-shadow:
      0 0 3vmin rgba(245,226,163,.45),
      0 0.4vmin 0 rgba(0,0,0,.5);
    font-variant-numeric:tabular-nums;
  }
  .time .colon{
    color:var(--gold);
    animation:pulse 2s ease-in-out infinite;
    margin:0 0.4vmin;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .divider{
    display:flex;align-items:center;justify-content:center;
    gap:1.6vmin;margin:1.8vmin 0 1.4vmin;color:var(--gold-deep);
  }
  .divider .line{height:0.2vmin;flex:1;background:linear-gradient(90deg,transparent,rgba(217,182,92,.55),transparent)}
  .divider .rune{font-size:2.2vmin;color:var(--gold)}

  .meta{
    display:flex;justify-content:space-between;align-items:baseline;
    gap:4vmin;
    font-family:'Shippori Mincho',serif;
    font-size:3.2vmin;color:var(--ink-dim);letter-spacing:0.3vmin;
  }
  .meta .date{color:var(--ink)}
  .meta .dow{color:var(--gold);font-weight:600}
</style>
</head>
<body>
  <div class="window">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <div class="time" id="time">
      <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span>
    </div>

    <div class="divider"><span class="line"></span><span class="rune">❖</span><span class="line"></span></div>

    <div class="meta">
      <span class="date" id="date">----</span>
      <span class="dow" id="dow">----</span>
    </div>
  </div>

<script>
  const dows = ['日曜','月曜','火曜','水曜','木曜','金曜','土曜'];
  function pad(n){return String(n).padStart(2,'0');}
  function tick(){
    const d = new Date();
    document.getElementById('hh').textContent = pad(d.getHours());
    document.getElementById('mm').textContent = pad(d.getMinutes());
    document.getElementById('date').textContent = (d.getMonth()+1) + '月 ' + d.getDate() + '日';
    document.getElementById('dow').textContent = '— ' + dows[d.getDay()] + '日 —';
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
