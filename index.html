<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異世界RPG時計</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#d9b65c;
    --gold-bright:#f5e2a3;
    --gold-deep:#8a6d2f;
    --ink:#e9e2cf;
    --ink-dim:#a99f86;
    --panel-1:#1a1530;
    --panel-2:#0e0b1c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    background:transparent;
    font-family:'Cinzel','Shippori Mincho',serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  .window{
    position:relative;
    width:300px;
    padding:22px 26px 20px;
    color:var(--ink);
    background:
      radial-gradient(120% 140% at 50% 0%, rgba(80,60,140,.35), transparent 60%),
      linear-gradient(160deg, var(--panel-1), var(--panel-2));
    border:2px solid var(--gold-deep);
    border-radius:14px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,.6),
      0 0 24px rgba(120,90,200,.25),
      inset 0 0 26px rgba(0,0,0,.55);
  }
  /* inner gilt line */
  .window::before{
    content:"";position:absolute;inset:6px;border-radius:9px;
    border:1px solid rgba(217,182,92,.45);
    pointer-events:none;
  }
  /* corner gems */
  .corner{
    position:absolute;width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 45%, var(--gold-deep) 100%);
    box-shadow:0 0 6px rgba(245,226,163,.7);
  }
  .corner.tl{top:9px;left:9px}.corner.tr{top:9px;right:9px}
  .corner.bl{bottom:9px;left:9px}.corner.br{bottom:9px;right:9px}

  .crest{
    text-align:center;
    font-family:'Cinzel Decorative',serif;
    font-size:11px;letter-spacing:3px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:2px;
  }
  .crest::before,.crest::after{content:"✦";margin:0 7px;color:var(--gold-deep);font-size:9px;vertical-align:middle}

  .time{
    text-align:center;
    font-weight:700;
    font-size:62px;
    line-height:1.05;
    letter-spacing:2px;
    color:var(--gold-bright);
    text-shadow:
      0 0 12px rgba(245,226,163,.45),
      0 2px 0 rgba(0,0,0,.5);
    font-variant-numeric:tabular-nums;
  }
  .time .colon{
    color:var(--gold);
    animation:pulse 2s ease-in-out infinite;
    margin:0 2px;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .divider{
    display:flex;align-items:center;justify-content:center;
    gap:8px;margin:8px 0 6px;color:var(--gold-deep);
  }
  .divider .line{height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(217,182,92,.55),transparent)}
  .divider .rune{font-size:10px;color:var(--gold)}

  .meta{
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:'Shippori Mincho',serif;
    font-size:12px;color:var(--ink-dim);letter-spacing:1px;
  }
  .meta .date{color:var(--ink)}
  .meta .dow{color:var(--gold);font-weight:600}
</style>
</head>
<body>
  <div class="window">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <div class="crest">Adventurer's Clock</div>

    <div class="time" id="time">
      <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span>
    </div>

    <div class="divider"><span class="line"></span><span class="rune">❖</span><span class="line"></span></div>

    <div class="meta">
      <span class="date" id="date">----</span>
      <span class="dow" id="dow">----</span>
    </div>
  </div>

<script>
  const dows = ['日曜','月曜','火曜','水曜','木曜','金曜','土曜'];
  function pad(n){return String(n).padStart(2,'0');}
  function tick(){
    const d = new Date();
    document.getElementById('hh').textContent = pad(d.getHours());
    document.getElementById('mm').textContent = pad(d.getMinutes());
    document.getElementById('date').textContent = (d.getMonth()+1) + '月 ' + d.getDate() + '日';
    document.getElementById('dow').textContent = '— ' + dows[d.getDay()] + '日 —';
  }
  tick();
  // 分が変わるタイミングに合わせて更新
  setInterval(tick, 1000);
</script>
</body>
</html>
